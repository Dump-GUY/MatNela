<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" id="tc" content="#080c18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MatNela">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" id="pwa-manifest">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍎</text></svg>">
<title>MatNela</title>
<style>
:root {
  --bg:#080c18; --bg2:#0d1225; --bg3:#111830;
  --card:rgba(13,18,37,.88); --cb:rgba(0,255,255,.18);
  --text:#e8f0ff; --t2:#7a90b8; --t3:#3d5280;
  --cy:#00ffff; --cyg:rgba(0,255,255,.35);
  --mg:#ff2d78; --mgg:rgba(255,45,120,.35);
  --ye:#ffe000; --yeg:rgba(255,224,0,.35);
  --gr:#00ff9d; --grg:rgba(0,255,157,.35);
  --re:#ff3c5a; --reg:rgba(255,60,90,.35);
  --pu:#b44fff; --pug:rgba(180,79,255,.35);
  --gc:rgba(0,255,255,.04); --sc:rgba(0,0,0,.16);
  --r1:5px; --r2:10px; --r3:16px; --rf:9999px;
  --fh:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --fb:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --gcy: 0 0 14px rgba(0,255,255,.45), 0 0 36px rgba(0,255,255,.15);
  --gmg: 0 0 14px rgba(255,45,120,.45), 0 0 36px rgba(255,45,120,.15);
  --gye: 0 0 14px rgba(255,224,0,.45),  0 0 36px rgba(255,224,0,.15);
  --ggr: 0 0 14px rgba(0,255,157,.45),  0 0 36px rgba(0,255,157,.15);
  --gre: 0 0 14px rgba(255,60,90,.45),  0 0 36px rgba(255,60,90,.15);
  --gpu: 0 0 14px rgba(180,79,255,.45), 0 0 36px rgba(180,79,255,.15);
  --cs: 0 8px 32px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
}
[data-theme="light"] {
  --bg:#f0f4ff; --bg2:#e4eaff; --bg3:#d6deff;
  --card:rgba(255,255,255,.85); --cb:rgba(80,120,255,.28);
  --text:#0a0e2a; --t2:#2a3870; --t3:#8090c0;
  --cy:#005fcc; --cyg:rgba(0,95,204,.3);
  --mg:#d4006a; --mgg:rgba(212,0,106,.28);
  --ye:#c07800; --yeg:rgba(192,120,0,.3);
  --gr:#006b38; --grg:rgba(0,107,56,.28);
  --re:#cc0020; --reg:rgba(204,0,32,.28);
  --pu:#6600bb; --pug:rgba(102,0,187,.28);
  --gc:rgba(60,80,255,.07); --sc:rgba(60,80,200,.04);
  --gcy:0 0 14px rgba(0,95,204,.5),0 0 30px rgba(0,95,204,.15),0 2px 8px rgba(0,0,0,.12);
  --gmg:0 0 14px rgba(212,0,106,.5),0 0 30px rgba(212,0,106,.15),0 2px 8px rgba(0,0,0,.12);
  --gye:0 0 14px rgba(192,120,0,.5),0 0 30px rgba(192,120,0,.15),0 2px 8px rgba(0,0,0,.12);
  --ggr:0 0 14px rgba(0,107,56,.5),0 0 30px rgba(0,107,56,.15),0 2px 8px rgba(0,0,0,.12);
  --gre:0 0 14px rgba(204,0,32,.5),0 0 30px rgba(204,0,32,.15),0 2px 8px rgba(0,0,0,.12);
  --gpu:0 0 14px rgba(102,0,187,.5),0 0 30px rgba(102,0,187,.15),0 2px 8px rgba(0,0,0,.12);
  --cs:0 4px 24px rgba(0,40,180,.12),inset 0 1px 0 rgba(255,255,255,.9);
}
/* ── SCROLLBAR ── */
:root {
  scrollbar-color: #3d5280 #0d1225;
  scrollbar-width: thin;
}
[data-theme="light"] {
  scrollbar-color: #8a9abf #e2e8ff;
  scrollbar-width: thin;
}
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0d1225; }
::-webkit-scrollbar-thumb { background: #3d5280; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #7a90b8; }
[data-theme="light"] ::-webkit-scrollbar-track { background: #e2e8ff; }
[data-theme="light"] ::-webkit-scrollbar-thumb { background: #8a9abf; border-radius: 4px; }
[data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: #3a5080; }
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fb);font-weight:700;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(var(--gc) 1px,transparent 1px),linear-gradient(90deg,var(--gc) 1px,transparent 1px);background-size:32px 32px}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,var(--sc) 0,var(--sc) 1px,transparent 1px,transparent 3px);opacity:.5}
[data-theme="light"] .card{box-shadow:var(--cs);border-color:rgba(80,120,255,.3)}
[data-theme="light"] .card-corners::after,[data-theme="light"] .card-corners::before{border-color:var(--cy)}
[data-theme="light"] .menu-hero-title{text-shadow:0 0 20px rgba(0,95,204,.5),0 0 40px rgba(0,95,204,.2)}
[data-theme="light"] .mbtn{border-width:1.5px}
[data-theme="light"] .stitle,[data-theme="light"] .sumtit{text-shadow:0 0 16px rgba(0,95,204,.4)}

/* TOGGLE SWITCH */
.sw-row{display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:.2rem}
.sw-lab{font-family:var(--fb);font-size:clamp(.9rem,3vw,1rem);color:var(--t2)}
.sw{position:relative;display:inline-block;width:50px;height:26px}
.sw input{opacity:0;width:0;height:0}
.sld{position:absolute;cursor:pointer;inset:0;background-color:var(--bg3);border:1px solid var(--cb);transition:.3s;border-radius:34px}
.sld:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:var(--t3);transition:.3s;border-radius:50%}
input:checked + .sld{background-color:var(--cyg);border-color:var(--cy)}
input:checked + .sld:before{transform:translateX(24px);background-color:var(--cy);box-shadow:var(--gcy)}

/* LANG TOGGLE */
.lang-toggle{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--cb);border-radius:var(--r2);padding:3px;flex-shrink:0}
.lang-btn{background:none;border:none;border-radius:7px;padding:.3rem .75rem;font-family:var(--fh);font-size:.88rem;font-weight:700;letter-spacing:.07em;color:var(--t2);cursor:pointer;transition:background .15s,color .15s;-webkit-appearance:none;appearance:none}
.lang-btn.active{background:var(--cy);color:#000;box-shadow:var(--gcy)}
[data-theme="light"] .lang-btn.active{color:#fff}

/* SCREENS */
.screen{display:none;flex-direction:column;align-items:center;position:fixed;inset:0;z-index:1;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding:max(env(safe-area-inset-top,0px),1rem) 1rem max(env(safe-area-inset-bottom,0px),1rem)}
.screen.active{display:flex}
.hidden{display:none!important}

/* CARD */
.card{background:var(--card);border:1px solid var(--cb);border-radius:var(--r3);box-shadow:var(--cs);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:relative}
.card-corners::after{content:'';position:absolute;top:7px;right:7px;width:12px;height:12px;border-top:1.5px solid var(--cy);border-right:1.5px solid var(--cy);border-radius:0 3px 0 0;pointer-events:none}
.card-corners::before{content:'';position:absolute;bottom:7px;left:7px;width:12px;height:12px;border-bottom:1.5px solid var(--cy);border-left:1.5px solid var(--cy);border-radius:0 0 0 3px;pointer-events:none;z-index:1}

/* MENU */
#menu-screen{justify-content:center;padding-top:max(env(safe-area-inset-top,0px),1rem);padding-bottom:max(env(safe-area-inset-bottom,0px),1rem)}
.menu-hero{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:.5em;margin-bottom:.3rem;flex-wrap:nowrap}
.menu-hero-apple{font-size:clamp(2.4rem,8vw,3.5rem);line-height:1;flex-shrink:0}
.menu-hero-title{font-family:var(--fh);font-size:clamp(1.6rem,6.5vw,3.2rem);font-weight:700;letter-spacing:.06em;color:var(--cy);text-shadow:var(--gcy);white-space:nowrap}
.menu-hero-title span{color:var(--text);text-shadow:none}
.menu-sub{font-family:var(--fb);font-size:clamp(.82rem,3vw,1rem);color:var(--t2);text-align:center;margin-bottom:clamp(.8rem,3vh,1.6rem);font-weight:700}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(.65rem,2.5vw,1.1rem);width:100%;max-width:min(580px,94vw)}
.mbtn{background:var(--card);border:1px solid var(--cb);border-radius:var(--r2);padding:clamp(1.15rem,4.5vw,1.9rem) clamp(.7rem,2.5vw,1.2rem);font-family:var(--fb);font-size:clamp(.95rem,3.5vw,1.15rem);font-weight:800;color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.35em;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);position:relative;overflow:hidden;transition:box-shadow .15s,border-color .15s,transform .1s;-webkit-appearance:none;appearance:none}
.mbtn::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mbtn:active{transform:scale(.96)}
.mico{width:clamp(1.6rem,5.5vw,2.2rem);height:clamp(1.6rem,5.5vw,2.2rem);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mico svg{width:100%;height:100%;display:block}
.cg{border-color:rgba(0,255,157,.28)}.cg::before{background:var(--gr);box-shadow:var(--ggr)}.cg:hover{border-color:rgba(0,255,157,.6);box-shadow:var(--ggr)}
.cm{border-color:rgba(255,45,120,.28)}.cm::before{background:var(--mg);box-shadow:var(--gmg)}.cm:hover{border-color:rgba(255,45,120,.6);box-shadow:var(--gmg)}
.cc{border-color:rgba(0,255,255,.28)}.cc::before{background:var(--cy);box-shadow:var(--gcy)}.cc:hover{border-color:rgba(0,255,255,.6);box-shadow:var(--gcy)}
.cp{border-color:rgba(180,79,255,.28)}.cp::before{background:var(--pu);box-shadow:var(--gpu)}.cp:hover{border-color:rgba(180,79,255,.6);box-shadow:var(--gpu)}
.cy{border-color:rgba(255,224,0,.28);grid-column:span 2;flex-direction:row;justify-content:center;font-size:clamp(.92rem,3.2vw,1.1rem)}
.cy::before{background:var(--ye);box-shadow:var(--gye)}.cy:hover{border-color:rgba(255,224,0,.7);box-shadow:var(--gye)}
.cgr{grid-column:span 2;flex-direction:row;justify-content:center;color:var(--t2);font-size:clamp(.9rem,3.2vw,1.08rem);padding-top:clamp(.9rem,3vw,1.25rem);padding-bottom:clamp(.9rem,3vw,1.25rem)}
.cgr::before{background:var(--t3)}
.cgr:hover{border-color:rgba(0,255,255,.6);box-shadow:var(--gcy);color:var(--text)}
.cgr:hover::before{background:var(--cy);box-shadow:var(--gcy)}

/* SETTINGS */
#settings-screen{justify-content:flex-start;padding-top:max(env(safe-area-inset-top,0px),.75rem)}
.shdr{width:100%;max-width:min(720px,96vw);display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;padding:0 .125rem;flex-shrink:0}
.stitle{font-family:var(--fh);font-size:clamp(1.1rem,4vw,1.6rem);font-weight:700;letter-spacing:.1em;color:var(--cy);text-shadow:var(--gcy)}
.bbtn{background:var(--card);border:1px solid var(--cb);min-width:40px;min-height:40px;padding:.5rem;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:border-color .15s,box-shadow .15s,transform .1s;flex-shrink:0;-webkit-appearance:none;appearance:none}
.bbtn:hover{border-color:var(--cy);box-shadow:var(--gcy)}.bbtn:active{transform:scale(.92)}
.scard{width:100%;max-width:min(720px,96vw);margin-bottom:.75rem;padding:clamp(.875rem,2.5vw,1.375rem)}
.sgrp{padding-bottom:1.1rem;margin-bottom:1.1rem;border-bottom:1px solid var(--cb)}
.sgrp:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.stit{display:flex;align-items:center;gap:.6rem;font-family:var(--fh);font-size:clamp(.9rem,3vw,1.1rem);font-weight:700;letter-spacing:.05em;margin-bottom:.75rem;color:var(--text)}
.sico{width:clamp(30px,8vw,38px);height:clamp(30px,8vw,38px);border-radius:var(--r1);border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:clamp(1rem,3.5vw,1.3rem);flex-shrink:0}
.igr{color:var(--gr);background:rgba(0,255,157,.08)}
.img{color:var(--mg);background:rgba(255,45,120,.08)}
.icy{color:var(--cy);background:rgba(0,255,255,.08)}
.ipu{color:var(--pu);background:rgba(180,79,255,.08)}
.iye{color:var(--ye);background:rgba(255,224,0,.08)}
.ire{color:var(--re);background:rgba(255,60,90,.08)}
.mslide{position:relative;height:clamp(38px,10vw,48px);margin:.75rem 0 .4rem;touch-action:none}
.strk{position:absolute;top:50%;left:0;right:0;height:4px;background:var(--bg3);border:1px solid var(--cb);border-radius:2px;transform:translateY(-50%)}
.sthm{position:absolute;top:50%;width:clamp(26px,7vw,32px);height:clamp(26px,7vw,32px);border-radius:var(--r1);transform:translate(-50%,-50%);cursor:grab;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:clamp(7px,2vw,9px);font-weight:700;color:#000;z-index:2;transition:box-shadow .15s;will-change:left;user-select:none}
.sthm:hover{transform:translate(-50%,-50%) scale(1.1);z-index:5}
.sthm:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.15);z-index:10}
.to1{background:var(--cy);box-shadow:var(--gcy)}
.to2{background:var(--pu);box-shadow:var(--gpu)}
.tre{background:var(--gr);box-shadow:var(--ggr)}
.leg{display:flex;gap:.5rem;flex-wrap:wrap;font-family:var(--fh);font-size:clamp(.7rem,2.2vw,.82rem);font-weight:600;letter-spacing:.04em;color:var(--t2);margin-top:.4rem}
.li{display:flex;align-items:center;gap:.25rem}
.ld{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.vmsg{margin-top:.4rem;font-family:var(--fb);font-size:clamp(.75rem,2.5vw,.85rem);font-weight:700;color:var(--re);background:rgba(255,60,90,.08);border:1px solid rgba(255,60,90,.3);padding:.35rem .6rem;border-radius:var(--r1);display:none}
.vmsg.v{display:block}
.bsav{background:rgba(0,255,157,.08);color:var(--gr);border:1px solid var(--gr);padding:clamp(.7rem,2.5vw,.95rem);border-radius:var(--r2);width:100%;font-family:var(--fh);font-size:clamp(.9rem,3vw,1.1rem);font-weight:700;letter-spacing:.1em;margin-top:.875rem;cursor:pointer;box-shadow:var(--ggr);transition:background .15s,transform .1s;-webkit-appearance:none;appearance:none}
.bsav:hover{background:rgba(0,255,157,.15)}.bsav:active{transform:scale(.98)}
.brst{background:rgba(255,60,90,.06);color:var(--re);border:1px solid rgba(255,60,90,.35);padding:clamp(.6rem,2vw,.8rem);border-radius:var(--r2);width:100%;font-family:var(--fh);font-size:clamp(.82rem,2.8vw,.98rem);font-weight:700;letter-spacing:.08em;margin-top:.4rem;cursor:pointer;transition:background .15s;-webkit-appearance:none;appearance:none}

/* PLAYING */
#playing-screen{justify-content:flex-start;gap:0;padding:max(env(safe-area-inset-top,0px),.75rem) 1rem max(env(safe-area-inset-bottom,0px),.75rem)}
.ghdr{width:100%;max-width:720px;display:grid;grid-template-columns:clamp(44px,12vw,56px) 1fr clamp(44px,12vw,56px);align-items:center;padding:.5rem .7rem;margin-bottom:.5rem;flex-shrink:0;border-radius:var(--r2);min-height:52px}
.dots{display:flex;gap:3px;flex-wrap:nowrap;flex-direction:column;justify-content:center;align-items:center;padding:0 4px}
.dotrow{display:flex;gap:4px;justify-content:center;}.dot{width:10px;height:10px;border-radius:2px;background:var(--bg3);border:1px solid var(--cb);transition:background .3s,box-shadow .3s;flex-shrink:0}
.dot.correct{background:var(--gr);border-color:var(--gr);box-shadow:0 0 6px var(--grg)}
.dot.wrong{background:var(--re);border-color:var(--re);box-shadow:0 0 6px var(--reg)}
.scbg{font-family:var(--fh);font-size:clamp(.95rem,3vw,1.15rem);font-weight:700;letter-spacing:.1em;color:var(--cy);text-align:right;justify-self:end}
.pcont{display:flex;flex-direction:column;align-items:center;width:100%;max-width:720px;gap:clamp(.7rem,3vh,1.5rem);padding-bottom:max(env(safe-area-inset-bottom,0px),.75rem)}
.oplbl{font-family:var(--fh);font-size:clamp(.6rem,2vw,.75rem);letter-spacing:.18em;color:var(--t3);text-transform:uppercase;margin-bottom:.15rem;flex-shrink:0}
.eq{font-family:var(--fh);font-weight:700;font-size:clamp(2rem,min(10vw,10vh),5.5rem);color:var(--text);display:flex;align-items:center;gap:.2em;margin:0;flex-wrap:wrap;justify-content:center;letter-spacing:.04em;flex-shrink:0}
.en{padding:.05em .15em}
.eo{color:var(--cy);padding:0 .05em;text-shadow:var(--gcy)}
.em{color:var(--ye);background:rgba(255,224,0,.08);border:2px solid var(--ye);border-radius:var(--r1);min-width:1.6ch;padding:.05em .25em;text-align:center;box-shadow:var(--gye);animation:pq 1.8s ease-in-out infinite}
@keyframes pq{0%,100%{box-shadow:var(--gye)}50%{box-shadow:0 0 24px var(--yeg),0 0 60px rgba(255,224,0,.1)}}
.ec{color:var(--gr);background:rgba(0,255,157,.08);border:2px solid var(--gr);border-radius:var(--r1);min-width:1.6ch;padding:.05em .25em;text-align:center;box-shadow:var(--ggr)}
.ew{color:var(--re);background:rgba(255,60,90,.08);border:2px solid var(--re);border-radius:var(--r1);min-width:1.6ch;padding:.05em .25em;text-align:center;text-decoration:line-through;text-decoration-thickness:3px;box-shadow:var(--gre)}
.iarea{width:100%;display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.udisp{font-family:var(--fh);font-weight:700;font-size:clamp(2rem,min(9vw,9vh),4.5rem);color:var(--cy);text-shadow:var(--gcy);min-width:120px;height:clamp(2.8rem,8vh,4.5rem);display:flex;align-items:center;justify-content:center;border-bottom:2px solid var(--cy);margin-bottom:clamp(.25rem,1vh,.75rem);gap:4px;letter-spacing:.06em}
.cur{width:3px;height:clamp(1.8rem,6vh,3.2rem);background:var(--cy);box-shadow:0 0 8px var(--cyg);border-radius:1px;animation:bl 1s step-end infinite}
@keyframes bl{50%{opacity:0}}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(.25rem,1.2vw,.55rem);width:100%;max-width:min(340px,92vw);padding:0 .25rem}
.nb{background:var(--card);border:1px solid var(--cb);color:var(--text);font-family:var(--fh);font-size:clamp(1.3rem,min(5vw,5vh),2rem);font-weight:700;height:clamp(3rem,min(11vw,11vh),5rem);border-radius:var(--r2);cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:border-color .1s,box-shadow .1s,transform .1s,background .1s;position:relative;overflow:hidden;-webkit-appearance:none;appearance:none}
.nb::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,255,.4),transparent)}
.nb:active{transform:scale(.93);background:rgba(0,255,255,.07);box-shadow:var(--gcy)}
.nb.del{color:var(--mg);border-color:rgba(255,45,120,.28);font-size:clamp(1rem,4vw,1.5rem)}
.nb.del::before{background:linear-gradient(90deg,transparent,rgba(255,45,120,.35),transparent)}
.nb.del:active{background:rgba(255,45,120,.07);box-shadow:var(--gmg)}
.nb.ok{background:rgba(0,255,157,.08);color:var(--gr);border-color:var(--gr);font-size:clamp(1rem,3.5vw,1.3rem);box-shadow:var(--ggr)}
.nb.ok:active{background:rgba(0,255,157,.18)}
.fcont{width:100%;display:flex;flex-direction:column;align-items:center;animation:su .28s cubic-bezier(.22,1,.36,1);flex-shrink:0}
@keyframes su{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.fcard{border-radius:var(--r3);padding:clamp(.75rem,2.5vw,1.2rem);width:100%;max-width:720px;text-align:center;margin-bottom:clamp(.5rem,1.8vh,1rem);border:1px solid;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.fcard.correct{background:rgba(0,255,157,.07);border-color:rgba(0,255,157,.4);box-shadow:var(--ggr)}
.fcard.wrong{background:rgba(255,60,90,.07);border-color:rgba(255,60,90,.4);box-shadow:var(--gre)}
.ftit{font-family:var(--fh);font-size:clamp(1.1rem,min(5vw,5vh),1.6rem);font-weight:700;letter-spacing:.08em;margin-bottom:.2rem}
.ftit.tc{color:var(--gr);text-shadow:var(--ggr)}.ftit.tw{color:var(--re);text-shadow:var(--gre)}
.ftxt{font-family:var(--fb);font-size:clamp(.78rem,2.5vw,.92rem);font-weight:700;color:var(--t2);margin-bottom:.3rem}
/* vis: no fixed height cap - scrolls with the page, no inner scrollbar */
.vis{background:rgba(0,0,0,.12);border-radius:var(--r2);padding:clamp(.5rem,2vw,.9rem) clamp(.4rem,1.5vw,.75rem);margin-top:.5rem;border:1px solid var(--cb);overflow:visible}
[data-theme="light"] .vis{background:rgba(255,255,255,.45)}
.nxbtn{background:rgba(0,255,255,.08);color:var(--cy);border:1px solid var(--cy);padding:clamp(.5rem,1.8vh,.9rem) clamp(1.2rem,6vw,2.5rem);border-radius:var(--r2);font-family:var(--fh);font-weight:700;font-size:clamp(.85rem,3vw,1.1rem);letter-spacing:.1em;cursor:pointer;box-shadow:var(--gcy);display:flex;align-items:center;gap:.5rem;transition:background .15s,transform .1s;-webkit-appearance:none;appearance:none}
.nxbtn:hover{background:rgba(0,255,255,.15)}.nxbtn:active{transform:scale(.97)}

/* BASKETS */
.brow{display:flex;justify-content:center;flex-wrap:wrap;gap:.6rem;align-items:flex-end;padding:.2rem .2rem .4rem}
.bwrp{display:flex;flex-direction:column;align-items:center;gap:.3rem}
.bsk{background:rgba(255,224,0,.06);border:1.5px solid rgba(255,224,0,.32);border-bottom:3px solid rgba(255,224,0,.48);border-radius:var(--r2);padding:.4rem;min-width:48px;min-height:42px;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:2px}
.bsk.hi{border-color:var(--ye);border-bottom-color:var(--ye);box-shadow:0 0 0 3px rgba(255,224,0,.18),var(--gye);background:rgba(255,224,0,.1)}

.apl{width:clamp(18px,4.5vw,26px);height:clamp(18px,4.5vw,26px);margin:1px;flex-shrink:0;filter:drop-shadow(0 0 3px rgba(255,80,80,.45));animation:pi .3s cubic-bezier(.22,1,.36,1) backwards}
.apl-dim{opacity:.35;filter:drop-shadow(0 0 2px rgba(255,60,90,.3))}
.bsk-sub{border-color:rgba(255,60,90,.35);border-bottom-color:rgba(255,60,90,.5);background:rgba(255,60,90,.04)}
@keyframes pi{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.vos{font-family:var(--fh);font-weight:700;font-size:clamp(1.3rem,4.5vw,2rem);color:var(--t3);align-self:center;line-height:1}
.vtxt{font-family:var(--fh);font-weight:700;font-size:clamp(.95rem,3.5vw,1.3rem);letter-spacing:.05em;color:var(--t2);text-align:center;padding:.3rem .25rem}
.vtxt b{color:var(--text)}.vtxt .res{color:var(--gr);text-shadow:var(--ggr)}

#summary-screen{justify-content:center}
.sumcard{padding:clamp(1.5rem,5vw,2.5rem) clamp(1.25rem,5vw,2rem);text-align:center;max-width:min(400px,92vw);width:100%;margin:1rem}

.star.active:nth-child(1){transform:scale(1.0) rotate(-12deg)}.star.active:nth-child(2){transform:scale(1.1) rotate(-5deg)}.star.active:nth-child(3){transform:scale(1.2) rotate(0)}.star.active:nth-child(4){transform:scale(1.1) rotate(5deg)}.star.active:nth-child(5){transform:scale(1.0) rotate(12deg)}

.sumbk:hover{background:rgba(0,255,255,.15)}

<script>
/* ═══════════════════════════════════
   PWA + SERVICE WORKER
═══════════════════════════════════ */
(function(){
  // Draw apple icon to canvas and export as PNG — proper maskable PNG like major PWAs
  function makeIcon(size, maskable) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const s = size;
    const cx = s / 2, cy = s / 2;
    const r = s * 0.42; // apple radius

    // Background
    ctx.fillStyle = '#080c18';
    if (!maskable) {
      // Rounded corners for "any" icon
      const rad = s * 0.16;
      ctx.beginPath();
      ctx.moveTo(rad, 0);
      ctx.lineTo(s - rad, 0);
      ctx.quadraticCurveTo(s, 0, s, rad);
      ctx.lineTo(s, s - rad);
      ctx.quadraticCurveTo(s, s, s - rad, s);
      ctx.lineTo(rad, s);
      ctx.quadraticCurveTo(0, s, 0, s - rad);
      ctx.lineTo(0, rad);
      ctx.quadraticCurveTo(0, 0, rad, 0);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillRect(0, 0, s, s);
    }

    // Scale factor — maskable: apple fits in safe zone (60%), any: larger
    const sc = maskable ? 0.22 : 0.32;
    const aR = r * sc / 0.42; // adjusted radius
    const aCy = cy + s * 0.05; // slightly below center

    // Apple body
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    // Simple apple shape using bezier curves
    ctx.moveTo(cx, aCy - aR * 0.85);
    ctx.bezierCurveTo(cx + aR * 0.15, aCy - aR * 1.1,  cx + aR * 1.1, aCy - aR * 0.5, cx + aR * 0.9, aCy + aR * 0.3);
    ctx.bezierCurveTo(cx + aR * 0.7, aCy + aR * 1.0,   cx + aR * 0.2, aCy + aR * 1.1, cx, aCy + aR * 1.0);
    ctx.bezierCurveTo(cx - aR * 0.2, aCy + aR * 1.1,   cx - aR * 0.7, aCy + aR * 1.0, cx - aR * 0.9, aCy + aR * 0.3);
    ctx.bezierCurveTo(cx - aR * 1.1, aCy - aR * 0.5,   cx - aR * 0.15, aCy - aR * 1.1, cx, aCy - aR * 0.85);
    ctx.closePath();
    ctx.fill();

    // Stem
    ctx.strokeStyle = '#65a30d';
    ctx.lineWidth = aR * 0.18;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, aCy - aR * 0.85);
    ctx.quadraticCurveTo(cx + aR * 0.25, aCy - aR * 1.45, cx + aR * 0.55, aCy - aR * 1.55);
    ctx.stroke();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(cx - aR * 0.3, aCy - aR * 0.2, aR * 0.18, aR * 0.32, -0.35, 0, Math.PI * 2);
    ctx.fill();

    return c.toDataURL('image/png');
  }

  // Generate icons at multiple sizes
  const sizes = [192, 256, 512];
  const anyIcons   = sizes.map(sz => ({src: makeIcon(sz, false), sizes: sz+'x'+sz, type:'image/png', purpose:'any'}));
  const maskIcons  = sizes.map(sz => ({src: makeIcon(sz, true),  sizes: sz+'x'+sz, type:'image/png', purpose:'maskable'}));

  const m={
    name:"MatNela",
    short_name:"MatNela",
    description:"Matematika s Nelou / Math with Nela",
    start_url:window.location.href,
    display:"standalone",
    orientation:"portrait-primary",
    background_color:"#080c18",
    theme_color:"#080c18",
    icons: [...anyIcons, ...maskIcons]
  };
  // Android Chrome handles blob: URLs correctly and needs them for proper maskable icons (no badge)
  // Windows Chrome needs data: URI because the OS installer process can't access blob: URLs
  const isAndroid = /android/i.test(navigator.userAgent);
  if (isAndroid) {
    document.getElementById('pwa-manifest').href = URL.createObjectURL(new Blob([JSON.stringify(m)], {type:'application/json'}));
  } else {
    document.getElementById('pwa-manifest').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(m));
  }

  // Also update apple-touch-icon dynamically for iOS
  const appleIcon = makeIcon(180, false);
  let appleLink = document.querySelector('link[rel="apple-touch-icon"]');
  if (!appleLink) { appleLink = document.createElement('link'); appleLink.rel = 'apple-touch-icon'; document.head.appendChild(appleLink); }
  appleLink.href = appleIcon;
})();
if('serviceWorker' in navigator){
  const sw=`const C='mn-v4';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./']).catch(()=>{})).then(()=>self.skipWaiting()));});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>clients.claim()));});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>{if(r)return r;return fetch(e.request).then(res=>{if(res&&res.status===200){const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));}return res;}).catch(()=>new Response('Offline',{status:503}));}));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'./'}).catch(()=>{});
}

    const end=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('touchmove',move);window.removeEventListener('mouseup',end);window.removeEventListener('touchend',end);};
    window.addEventListener('mousemove',move,{passive:true});

  };

}

let G={ops:[],sc:0,cnt:0,hist:[],cur:null,ans:'',used:new Set(),recentAns:[]};
const rnd=(lo,hi)=>{if(lo>hi)[lo,hi]=[hi,lo];return Math.floor(Math.random()*(hi-lo+1))+lo;};

// Weighted random: middle of range is preferred over extremes (especially 1)
const rndW=(lo,hi)=>{
  if(lo>=hi)return lo;
  const pool=[];
  for(let n=lo;n<=hi;n++){
    pool.push(n);
    if(n>lo&&n<hi)pool.push(n); // mid-range appears twice → less bias toward 1 or max
  }
  return pool[Math.floor(Math.random()*pool.length)];
};

function gen(ops){
  let p=null,t=0;
  while(!p&&t<150){
    const op=ops[Math.floor(Math.random()*ops.length)];const s=S[op];let n1,n2,res;
    try{
      if(op==='+'){
        n1=rndW(1,s.op1);
        const maxN2=Math.min(s.op2,s.res-n1);
        if(maxN2<1){t++;continue;}
        n2=rndW(1,maxN2);res=n1+n2;
      }
      else if(op==='-'){
        n1=rndW(2,s.op1);
        const mn=Math.max(1,n1-s.res),mx=Math.min(s.op2,n1-1);
        if(mx<mn){t++;continue;}
        n2=rndW(mn,mx);res=n1-n2;
      }
      else if(op==='·'){
        // Fix: generate n2 first (constrained range), then n1 freely — prevents n2=1 bias
        n2=rndW(1,s.op2);
        const maxN1=Math.min(s.op1,Math.floor(s.res/n2));
        if(maxN1<1){t++;continue;}
        n1=rndW(1,maxN1);res=n1*n2;
      }
      else{
        n2=rndW(1,Math.min(s.op2,s.op1));
        const maxQ=Math.min(s.res,Math.floor(s.op1/n2));
        if(maxQ<1){t++;continue;}
        res=rndW(1,maxQ);n1=n2*res;
      }
      const r=Math.random();
      const tp=r<0.4?'result':r<0.7?'missing_second':'missing_first';
      const a=tp==='result'?res:tp==='missing_first'?n1:n2;
      const k=`${op}:${n1}:${n2}:${tp}`;
      // Anti-repeat: avoid same answer 2x in a row (unless stuck after many tries)
      const rpt=G.recentAns.length>=2&&G.recentAns.slice(-2).every(x=>x===a);
      if((!G.used.has(k)||t>80)&&(!rpt||t>110)){
        G.used.add(k);p={n1,n2,op,tp,ans:a};
      }
    }catch(e){}t++;
  }
  return p||{n1:2,n2:3,op:'+',tp:'result',ans:5};
}

  if(op==='·')h='<div class="brow">'+Array.from({length:n1},(_,i)=>bsk(n2,`${t.basket} ${i+1}`)).join('')+'</div>';
  else if(op===':')h='<div class="brow">'+Array.from({length:n2},(_,i)=>bsk(n1/n2,`${t.basket} ${i+1}`)).join('')+'</div>';
  else if(op==='+')h=`<div class="brow">${bsk(n1,`${n1} ${t.apples}`)}<span class="vos">+</span>${bsk(n2,`${n2} ${t.apples}`)}<span class="vos">=</span>${bsk(n1+n2,`${n1+n2} ${t.total}`,true)}</div>`;
  else if(op==='-'){
    // basket of n1 apples, minus basket of n2 (shown as removed), equals basket of result
    const res=n1-n2;
    h=`<div class="brow">${bskSub(n1,n2,`${n1} ${t.apples}`)}<span class="vos">−</span>${bsk(n2,`${n2} ${t.apples}`,'sub-remove')}<span class="vos">=</span>${bsk(res,`${res} ${t.total}`,true)}</div>`;
  }
  EL.vis.innerHTML=h;
}
function cft(){
  const cs=['#00ffff','#ff2d78','#ffe000','#00ff9d','#b44fff'];
  for(let i=0;i<50;i++){
    const e=document.createElement('div');
    e.style.cssText=`position:fixed;pointer-events:none;z-index:9999;left:50%;top:40%;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;border-radius:${Math.random()>.5?'50%':'2px'};background:${cs[i%cs.length]};box-shadow:0 0 5px ${cs[i%cs.length]};`;
    document.body.appendChild(e);
    const a=Math.random()*Math.PI*2,v=7+Math.random()*9;
    e.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:`translate(${Math.cos(a)*v*26}px,${Math.sin(a)*v*26+150}px) rotate(${(Math.random()-.5)*720}deg)`,opacity:0}],{duration:800+Math.random()*400,easing:'cubic-bezier(.22,1,.36,1)',delay:i*13}).onfinish=()=>e.remove();
  }
}
document.addEventListener('keydown',e=>{
  if(!SCR['playing-screen'].classList.contains('active'))return;
  if(e.key>='0'&&e.key<='9')hi(parseInt(e.key));
  else if(e.key==='Backspace')hd();
  else if(e.key==='Enter'){if(!EL.fm.classList.contains('hidden'))hn();else hs();}
});

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
initTheme();
curLang=detectLang();
setLang(curLang,false);
</script>
